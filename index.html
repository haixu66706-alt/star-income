<!-- ====== 云端数据层：使用 MemFire Cloud（兼容 Supabase） ====== -->
<!-- 使用前替换下方 SB_URL 和 SB_KEY 为你的项目信息 -->
<script>
const SB_URL = 'https://你的项目ID.memfiredb.com';  // ← 项目 URL
const SB_KEY = '你的anon_key';                     // ← 匿名密钥
let _rc = null, _sc = null;

async function _cf(method, path, body) {
  try {
    if (SB_URL.includes('你的项目ID')) return null;
    var opts = { method: method, headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY } };
    if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    if (method === 'POST') opts.headers['Prefer'] = 'resolution=merge-duplicates';
    var ctrl = new AbortController(); opts.signal = ctrl.signal;
    var t = setTimeout(function(){ ctrl.abort(); }, 5000);
    var r = await fetch(SB_URL + path, opts);
    clearTimeout(t);
    if (!r.ok) throw new Error(r.status);
    return r.status === 204 ? null : await r.json();
  } catch(e) { console.warn('云请求失败:', e.message); return null; }
}

async function _loadCloud() {
  var oR = (function(){try{return JSON.parse(localStorage.getItem('kitty_records')||'[]')}catch(e){return[]}})();
  var oS = (function(){try{return JSON.parse(localStorage.getItem('kitty_schedules')||'[]')}catch(e){return[]}})();
  var cR = await _cf('GET', '/rest/v1/app_data?select=value&key=eq.records');
  var cS = await _cf('GET', '/rest/v1/app_data?select=value&key=eq.schedules');
  if (cR && cR.length) { _rc = cR[0].value; }
  else { _rc = oR; if (oR.length) _cf('POST', '/rest/v1/app_data', { key: 'records', value: oR, updated_at: new Date().toISOString() }); }
  if (cS && cS.length) { _sc = cS[0].value; }
  else { _sc = oS; if (oS.length) _cf('POST', '/rest/v1/app_data', { key: 'schedules', value: oS, updated_at: new Date().toISOString() }); }
}

function lR() { return _rc || []; }
function lS() { return _sc || []; }
function sR(a) { _rc = a; _cf('POST', '/rest/v1/app_data', { key: 'records', value: a, updated_at: new Date().toISOString() }); }
function sS(a) { _sc = a; _cf('POST', '/rest/v1/app_data', { key: 'schedules', value: a, updated_at: new Date().toISOString() }); }
</script>

/* 浮动的星光 */
/* floating stars removed - using animated background instead */
/* after removed */
@keyframes starFloat {
  0%, 100% { transform: translateY(0) scale(1); opacity:.8; }
  50% { transform: translateY(-18px) scale(1.06); opacity:1; }
}
/* 闪烁的十字星 */
@keyframes twinkle {
  0%, 100% { opacity:.3; transform: scale(.8); }
  50% { opacity:1; transform: scale(1.2); }
}

.app { max-width:420px; margin:0 auto; padding:1.2rem; position:relative; z-index:1; }

/* ---------- 星星人卡通形象 ---------- */
.star-mascot { width:120px; margin:0 auto .5rem; filter: drop-shadow(0 0 16px rgba(240,184,64,.35)); animation: mascotFloat 4s ease-in-out infinite; }
.star-mascot svg { width:100%; height:auto; display:block; }
@keyframes mascotFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.star-mascot-sm { width:64px; margin:0 auto .5rem; filter: drop-shadow(0 0 10px rgba(240,184,64,.25)); animation: mascotFloat 5s ease-in-out infinite; }
.star-mascot-sm svg { width:100%; height:auto; display:block; }

/* ---------- 头部 ---------- */
.header { text-align:center; padding:1.2rem 0 .8rem; }
.header .star-icon { font-size:2.2rem; display:block; margin-bottom:.25rem;
  filter: drop-shadow(0 0 12px rgba(240,184,64,.5)); animation: twinkle 3s ease-in-out infinite; }
.header h1 { font-size:1.5rem; font-weight:700; background: linear-gradient(135deg, var(--gold), var(--gold-warm), var(--candy));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:1px; }
.header .sub { font-size:.73rem; color:var(--text-dim); margin-top:.2rem; letter-spacing:1px; }

/* ---------- 总额 ---------- */
.big { text-align:center; padding:.3rem 0 1.2rem; }
.big .currency { font-size:1.2rem; color:var(--gold); font-weight:500; vertical-align:top; }
.big .val { font-size:3rem; font-weight:800; color:var(--text); letter-spacing:-1px;
  text-shadow: 0 0 20px rgba(240,184,64,.2); }

/* ---------- 三列卡片 ---------- */
.row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.55rem; margin-bottom:1rem; }
.r3-item { background:var(--card-bg); border-radius:var(--r); padding:.9rem .4rem; text-align:center;
  box-shadow:var(--shadow); border:1.5px solid var(--card-border); transition: transform .15s;
  backdrop-filter:blur(8px); }
.r3-item:active { transform:scale(.96); }
.r3-item .icon { font-size:1.3rem; display:block; margin-bottom:.35rem; }
.r3-item .label { font-size:.68rem; color:var(--text-dim); margin-bottom:.2rem; }
.r3-item .num { font-size:1.25rem; font-weight:700; color:var(--gold); }

/* ---------- 卡片 / 表单 ---------- */
.card { background:var(--card-bg); border-radius:var(--r); padding:1rem 1.1rem; margin-bottom:.8rem;
  box-shadow:var(--shadow); border:1.5px solid var(--card-border); backdrop-filter:blur(8px); }
.card h3 { font-size:.95rem; margin-bottom:.8rem; display:flex; align-items:center;
  gap:.4rem; color:var(--gold); }
.form-group { margin-bottom:.55rem; }
.form-group label { display:block; font-size:.76rem; font-weight:600; color:var(--text-dim); margin-bottom:.2rem; }
.form-group input, .form-group textarea { width:100%; padding:.6rem .75rem;
  border:2px solid rgba(255,255,255,.08); border-radius:10px; font-size:.95rem; font-family:inherit;
  background:rgba(255,255,255,.04); color:var(--text);
  transition:all .2s; -webkit-appearance:none; }
.form-group input:focus, .form-group textarea:focus { outline:none;
  border-color:var(--gold); background:rgba(255,255,255,.07);
  box-shadow:0 0 0 3px rgba(240,184,64,.1); }
.form-group input::placeholder, .form-group textarea::placeholder { color:rgba(138,148,184,.5); }
.form-group textarea { resize:vertical; min-height:48px; }

/* 暗色 date/time input */
.form-group input[type="date"], .form-group input[type="time"] { color-scheme:dark; }

.frow { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; }

/* ---------- 按钮 ---------- */
.btn { width:100%; padding:.7rem; border:none; border-radius:25px; font-size:1rem; font-weight:700;
  cursor:pointer; transition:all .2s; margin-top:.4rem; letter-spacing:.5px; }
.btn-primary { background: linear-gradient(135deg, var(--gold), var(--gold-warm)); color:#1A1620;
  box-shadow:0 4px 18px rgba(240,184,64,.3); }
.btn-primary:active { transform:scale(.96); box-shadow:0 2px 8px rgba(240,184,64,.2); }
.btn-secondary { background:transparent; border:2px solid var(--gold); color:var(--gold); }
.btn-secondary:active { background:rgba(240,184,64,.08); }
.btn-sm { width:auto; padding:.35rem .9rem; font-size:.8rem; background:rgba(255,255,255,.6);
  border:2px solid rgba(255,255,255,.08); color:var(--text-dim); border-radius:20px; }
.btn-sm:active { background:rgba(240,184,64,.08); border-color:var(--gold); color:var(--gold); }
.btn-xs { width:auto; padding:.2rem .55rem; font-size:.68rem; background:rgba(255,255,255,.03);
  border:1.5px solid rgba(255,255,255,.08); color:var(--text-dim); border-radius:8px; cursor:pointer; }
.btn-xs:active { background:rgba(240,184,64,.1); color:var(--gold); border-color:var(--gold); }
.btn-row { display:flex; gap:.4rem; align-items:center; }
.btn-row .btn { flex:1; }

/* ---------- Toast ---------- */
.toast { position:fixed; top:1rem; left:50%; transform:translateX(-50%);
  background:rgba(30,40,70,.95); backdrop-filter:blur(12px); color:var(--gold);
  padding:.6rem 1.2rem; border-radius:25px; font-size:.85rem; z-index:999;
  pointer-events:none; opacity:0; transition:opacity .3s;
  border:1px solid rgba(240,184,64,.2); box-shadow:var(--glow); }
.toast.show { opacity:1; }

/* ---------- 表格 ---------- */
.tbl { width:100%; border-collapse:collapse; font-size:.74rem; }
.tbl thead tr { color:var(--text-dim); border-bottom:2px solid rgba(255,255,255,.06); }
.tbl th { padding:.3rem .2rem; text-align:left; }
.tbl td { padding:.35rem .2rem; border-bottom:1px solid rgba(255,255,255,.04); }
.tbl .del { text-align:center; cursor:pointer; color:rgba(138,148,184,.35); width:20px; }
.tbl .del:active { color:var(--candy); }

/* ---------- 统计小卡 ---------- */
.stat-sm { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; margin-bottom:.5rem; }
.stat-sm .item { background:rgba(255,255,255,.03); border-radius:12px; padding:.7rem; text-align:center;
  box-shadow:var(--shadow); border:1.5px solid var(--card-border); }
.stat-sm .item .n { font-size:1.2rem; font-weight:700; color:var(--gold); }
.stat-sm .item .l { font-size:.66rem; color:var(--text-dim); margin-top:.1rem; }

/* ---------- 历史月份 ---------- */
.mo-item { background:var(--card-bg); border-radius:12px; padding:.7rem 1rem; display:flex;
  justify-content:space-between; align-items:center; margin-bottom:.4rem;
  box-shadow:0 1px 6px rgba(0,0,0,.2); border:1px solid var(--card-border); }
.mo-item .n { font-weight:600; color:var(--text); }
.mo-item .d { text-align:right; font-size:.85rem; }

/* ---------- 记录列表 ---------- */
.rec-list { display:flex; flex-direction:column; gap:.5rem; }
.rec { background:var(--card-bg); border-radius:12px; padding:.7rem .9rem; display:flex; align-items:center;
  gap:.65rem; box-shadow:0 1px 6px rgba(0,0,0,.2); border:1px solid var(--card-border);
  transition:transform .15s; position:relative; cursor:pointer; }
.rec:active { transform:scale(.98); }
.rec .badge { background:linear-gradient(135deg, rgba(240,184,64,.25), rgba(192,128,48,.15));
  color:var(--gold); border-radius:10px; padding:.3rem .4rem; text-align:center;
  min-width:42px; flex-shrink:0; font-size:.7rem; line-height:1.2; border:1px solid rgba(240,184,64,.15); }
.rec .badge .d { font-size:1.2rem; display:block; font-weight:700; color:var(--gold-warm); }
.rec .mid { flex:1; min-width:0; }
.rec .mid .proj { font-weight:600; font-size:.9rem; color:var(--text); }
.rec .mid .meta { font-size:.72rem; color:var(--text-dim); margin-top:.1rem; }
.rec .right { text-align:right; flex-shrink:0; }
.rec .right .income { font-weight:700; color:var(--gold); font-size:.95rem; }
.rec .right .hrs { font-size:.7rem; color:var(--text-dim); }
  /* Chart.js — 暖色调适配 */
.rec .x { position:absolute; top:.3rem; right:.3rem; width:20px; height:20px; border:none;
  background:transparent; color:rgba(138,148,184,.3); font-size:.8rem; cursor:pointer; border-radius:50%; }
.rec .x:active { color:var(--candy); background:rgba(255,113,154,.08); }

/* ---------- 空状态 ---------- */
.empty { text-align:center; padding:2.5rem 1rem; color:var(--text-dim); }
  /* Chart.js — 暖色调适配 */
.empty .icon { font-size:3rem; display:block; margin-bottom:.6rem; opacity:.6; }

/* ---------- 统计页 ---------- */
.stats-page { display:none; }
.stats-page.active { display:block; }
.chart-box { background:var(--card-bg); border-radius:var(--r); padding:.8rem; margin-bottom:.6rem;
  box-shadow:var(--shadow); border:1.5px solid var(--card-border); }
.chart-box canvas { max-height:200px; }
.stat-main { background:var(--card-bg); border-radius:var(--r); padding:1rem; text-align:center;
  box-shadow:var(--shadow); border:1.5px solid var(--card-border); margin-bottom:.6rem; }
.stat-main .sn { font-size:1.6rem; font-weight:700; color:var(--gold);
  text-shadow:0 0 12px rgba(240,184,64,.2); }
.stat-main .sl { font-size:.73rem; color:var(--text-dim); margin-top:.15rem; }

/* ---------- 底部导航 ---------- */
.tabs { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:420px;
  background:rgba(10,22,40,.92); backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,.06); display:flex; padding-bottom:var(--safe); z-index:10; }
.tabs button { flex:1; padding:.65rem; border:none; background:transparent; font-size:.82rem;
  cursor:pointer; color:var(--text-dim); font-weight:500; }
.tabs button.on { color:var(--gold); font-weight:700; }
.spacer { height:calc(3.5rem + var(--safe)); }

/* ---------- 编辑状态 ---------- */
.editing { border-color:var(--gold) !important;
  box-shadow:0 0 0 3px rgba(212,160,64,.15), var(--glow) !important; }

/* ---------- Chart.js 暗色适配 ---------- */
.chart-box { color:var(--text-dim); }
  /* Chart.js — 暖色调适配 */

@keyframes floatUp {
  0% { transform: translateY(100vh) rotate(0deg) scale(0); opacity: 0; }
  10% { opacity: 0.7; }
  90% { opacity: 0.7; }
  100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
}
.star-particle:nth-child(odd) { animation-duration: 6s; }
.star-particle:nth-child(even) { animation-duration: 8s; }
.star-particle:nth-child(3n) { animation-duration: 10s; }
.star-particle:nth-child(5n+2) { animation-duration: 7s; }

</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div class="app">

<div class="header">
  <div class="star-mascot" aria-label="五角星">
    <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="halo" cx="50%" cy="45%" r="50%">
          <stop offset="0%" stop-color="#FFD36E" stop-opacity=".35"/>
          <stop offset="100%" stop-color="#FFD36E" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="starGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#FFEAA0"/>
          <stop offset="100%" stop-color="#F5A623"/>
        </linearGradient>
      </defs>
      <circle cx="80" cy="80" r="70" fill="url(#halo)"/>
      <polygon points="80,8 97,60 152,60 108,93 122,144 80,112 38,144 52,93 8,60 63,60"
               fill="url(#starGrad)" stroke="#E8A820" stroke-width="2" stroke-linejoin="round"/>
    </svg>
  </div>
  <h1>星星人 · 收入本</h1>
  <div class="sub">✦ 星光不负赶路人 ✦</div>
</div>

<div class="big"><span class="currency">¥</span><span class="val" id="heroIncome">0</span></div>

<div class="row3">
  <div class="r3-item"><span class="icon">🌟</span><div class="label">工作天数</div><div class="num" id="heroDays">0</div></div>
  <div class="r3-item"><span class="icon">✨</span><div class="label">本月收入</div><div class="num" id="heroMonthIncome">¥0</div></div>
  <div class="r3-item"><span class="icon">💫</span><div class="label">上课人数</div><div class="num" id="heroStudents">0</div></div>
</div>

<!-- ========== 首页 ========== -->
<div id="page-add">

  <!-- 记一笔 -->
  <div class="card" id="cardAdd">
    <h3 id="cardAddTitle">🌙 记一笔</h3>
    <div class="frow">
      <div class="form-group"><label>日期</label><input type="date" id="inDate"></div>
      <div class="form-group"><label>节数</label><input type="number" id="inLessons" placeholder="例: 2" step="1" min="1"></div>
    </div>
    <div class="frow">
      <div class="form-group"><label>课薪 (¥/节)</label><input type="number" id="inRate" placeholder="例: 150" step="1" min="1"></div>
      <div class="form-group"><label>上课人数</label><input type="number" id="inStudents" placeholder="例: 3" step="1" min="1"></div>
    </div>
    <div class="form-group"><label>备注（可选）</label><textarea id="inNote" placeholder="科目 / 学生名 / 内容…"></textarea></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btnSave" onclick="saveRecord()">⭐ 记一颗星</button>
      <button class="btn btn-secondary" id="btnCancel" style="display:none" onclick="cancelEdit()">取消编辑</button>
    </div>
  </div>

  <!-- 每日上课时间表 -->
  <div class="card">
    <h3>📅 每日上课时间表</h3>
    <div class="frow">
      <div class="form-group"><label>开始日期</label><input type="date" id="scDateStart"></div>
      <div class="form-group"><label>结束日期</label><input type="date" id="scDateEnd"></div>
    </div>
    <div class="frow">
      <div class="form-group"><label>开始时间</label><input type="time" id="scStart" value="14:00"></div>
      <div class="form-group"><label>结束时间</label><input type="time" id="scEnd" value="16:00"></div>
    </div>
    <div class="frow">
      <div class="form-group"><label>科目 / 学生</label><input type="text" id="scSubject" placeholder="例: 数学·小明"></div>
      <div class="form-group"><label>节数</label><input type="number" id="scCount" placeholder="例: 2" step="1" min="1"></div>
    </div>
    <div class="frow">
      <div class="form-group"><label>上课学生姓名</label><input type="text" id="scStudentName" placeholder="例: 小明、小红"></div>
      <div class="form-group"><label>上课人数</label><input type="number" id="scStudentCount" placeholder="例: 3" step="1" min="1"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addSched()">📅 添加课程</button>
      <button class="btn btn-secondary" style="font-size:.85rem" onclick="batchToIncome()">💫 课程→收入</button>
    </div>

    <!-- 表格 -->
    <div style="margin-top:.6rem">
      <table class="tbl" id="schedTable">
        <thead><tr><th>日期</th><th>时间</th><th>科目</th><th>学生</th><th style="text-align:right">人数</th><th style="text-align:right">节数</th><th class="del"></th></tr></thead>
        <tbody id="schedBody"></tbody>
      </table>
    </div>

    <!-- 课时统计 -->
    <div id="schedStats" style="display:none;margin-top:.8rem">
      <div style="font-size:.82rem;font-weight:700;color:var(--gold);margin-bottom:.5rem">✨ 本月课时统计</div>
      <div class="stat-sm" id="schedStatGrid"></div>
      <table class="tbl" id="schedDetailTable" style="display:none;margin-top:.3rem">
        <thead><tr><th>科目/学生</th><th style="text-align:right">节数</th><th style="text-align:right">占比</th></tr></thead>
        <tbody id="schedDetailBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 最近记录 -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem">
    <span style="font-size:.85rem;color:var(--text-dim);font-weight:600">📋 最近记录</span>
    <div class="btn-row">
      <button class="btn-xs" onclick="exportData()" aria-label="导出数据">📤 导出</button>
      <button class="btn-xs" onclick="document.getElementById('importFile').click()" aria-label="导入数据">📥 导入</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn-xs" onclick="clearRecords()" aria-label="清空收入记录">🗑 清空</button>
    </div>
  </div>
  <div class="rec-list" id="recentList"></div>
  <div class="spacer"></div>
</div>

<!-- ========== 统计页 ========== -->
<div id="page-stats" class="stats-page">
  <div class="stat-main"><div class="sn" id="statAvg">¥0/节</div><div class="sl">平均课薪</div></div>
  <div class="chart-box" id="chartLineBox"><div style="font-size:.85rem;color:var(--text-dim);font-weight:600;margin-bottom:.4rem">📈 月度收入趋势</div><canvas id="chartLine"></canvas></div>
  <div class="chart-box" id="chartPieBox"><div style="font-size:.85rem;color:var(--text-dim);font-weight:600;margin-bottom:.4rem">🏷️ 科目/学生占比</div><canvas id="chartPie"></canvas></div>
  <div class="chart-box" id="chartBarBox"><div style="font-size:.85rem;color:var(--text-dim);font-weight:600;margin-bottom:.4rem">📊 月度收入对比</div><canvas id="chartBar"></canvas></div>
  <div style="font-size:.85rem;color:var(--text-dim);font-weight:600;margin-bottom:.5rem">🌌 历史月份</div>
  <div id="monthList"></div>
  <div class="spacer"></div>
</div>

</div>

<nav class="tabs" role="tablist" aria-label="主导航">
  <button class="on" id="tbAdd" role="tab" aria-selected="true" onclick="sw('add')">📝 记一笔</button>
  <button id="tbStats" role="tab" aria-selected="false" onclick="sw('stats')">📊 统计</button>
</nav>

<script>
// ======================== PWA 注册 ========================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(function(reg){
    console.log('⭐ PWA 已就绪（离线可用）');
  }).catch(function(err){
    console.log('Service Worker 注册失败:', err);
  });
}

// ======================== 数据层 ========================
const K = 'kitty_records';
const KS = 'kitty_schedules';
function lR() { try{return JSON.parse(localStorage.getItem(K)||'[]')}catch(e){return[]} }
function sR(a) { localStorage.setItem(K, JSON.stringify(a)); }
function lS() { try{return JSON.parse(localStorage.getItem(KS)||'[]')}catch(e){return[]} }
function sS(a) { localStorage.setItem(KS, JSON.stringify(a)); }

// 编辑状态
var _editingId = null;

// ======================== Toast ========================
var _toastTimer;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 1800);
}

// ======================== 上课时间表 ========================
function addSched() {
  var startDate = document.getElementById('scDateStart').value;
  var endDate = document.getElementById('scDateEnd').value;
  var start = document.getElementById('scStart').value;
  var end = document.getElementById('scEnd').value;
  var t = start + '-' + end;
  var subj = document.getElementById('scSubject').value.trim();
  var c = parseInt(document.getElementById('scCount').value);
  var studentName = document.getElementById('scStudentName').value.trim();
  var studentCount = parseInt(document.getElementById('scStudentCount').value) || 0;

  if (!startDate) return toast('请选开始日期');
  if (!endDate) return toast('请选结束日期');
  if (endDate < startDate) return toast('结束日期必须晚于开始日期');
  if (!start || !end) return toast('请选择上课时间');
  if (end <= start) return toast('结束时间必须晚于开始时间');
  if (!subj) return toast('请填科目/学生');
  if (!c || c <= 0) return toast('请填节数');

  // 生成日期范围
  var dates = [];
  var cur = new Date(startDate + 'T00:00:00');
  var endD = new Date(endDate + 'T00:00:00');
  while (cur <= endD) {
    dates.push(cur.toISOString().split('T')[0]);
    cur.setDate(cur.getDate() + 1);
  }

  var a = lS();
  dates.forEach(function(d){
    a.push({
      id: Date.now().toString(36)+Math.random().toString(36).slice(2,6) + '_' + d,
      date: d,
      time: t,
      subject: subj,
      count: c,
      studentName: studentName,
      studentCount: studentCount
    });
  });
  sS(a);

  toast('✨ 已添加 ' + dates.length + ' 天课程');
}

function rmSched(id) {
  if (!confirm('删除这条课程安排？')) return;
  sS(lS().filter(function(x){ return x.id !== id; }));
  renderScheds();
  toast('已删除');
}

/** 批量将本月课程转为收入记录 */
function batchToIncome() {
  var all = lS();
  var now = new Date();
  var thisMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  var monthScheds = all.filter(function(s){ return s.date.startsWith(thisMonth); });
  if (!monthScheds.length) return toast('本月还没有课程安排');

  var rate = parseInt(document.getElementById('inRate').value) || 150;
  var records = lR();
  var existingDates = new Set(records.map(function(r){ return r.date + '|' + (r.note||''); }));
  var added = 0;

  monthScheds.forEach(function(s){
    var key = s.date + '|' + s.subject;
    if (existingDates.has(key)) return;
    records.push({
      id: Date.now().toString(36)+Math.random().toString(36).slice(2,6) + '_' + added,
      date: s.date,
      lessons: s.count,
      rate: rate,
      students: s.studentCount || 1,
      note: s.studentName ? s.subject + '｜' + s.studentName : s.subject,
      ts: new Date().toISOString()
    });
    existingDates.add(key);
    added++;
  });

  if (added === 0) return toast('所有课程已导入过，无需重复');
  sR(records);
  syncAll();
  toast('✨ 已导入 ' + added + ' 条收入记录');
}

function renderScheds() {
  var all = lS().sort(function(a,b){ return b.date.localeCompare(a.date) || a.time.localeCompare(b.time); });
  var tb = document.getElementById('schedBody');
  if (!all.length) {
    tb.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:1.5rem;color:var(--text-dim)"><div class="star-mascot-sm" style="margin-bottom:.4rem">' + starSvgSmall() + '</div>还没有课程安排~</td></tr>';
    document.getElementById('schedStats').style.display = 'none';
    return;
  }
  tb.innerHTML = all.map(function(s){
    var dt = new Date(s.date + 'T00:00:00');
    return '<tr>' +
      '<td>' + (dt.getMonth()+1) + '/' + dt.getDate() + '</td>' +
      '<td>' + he(s.time) + '</td>' +
      '<td>' + he(s.subject) + '</td>' +
      '<td>' + he(s.studentName || '-') + '</td>' +
      '<td style="text-align:right">' + (s.studentCount || '-') + '</td>' +
      '<td style="text-align:right;font-weight:600">' + s.count + '节</td>' +
      '<td class="del" onclick="rmSched(\'' + s.id + '\')" role="button" tabindex="0" aria-label="删除课程">✕</td>' +
    '</tr>';
  }).join('');

  // 课时统计:本月
  var now = new Date();
  var thisMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  var monthScheds = all.filter(function(s){ return s.date.startsWith(thisMonth); });

  var totalLessons = monthScheds.reduce(function(sum, s){ return sum + s.count; }, 0);
  var subjMap = {};
  monthScheds.forEach(function(s){
    var key = s.subject || '其他';
    subjMap[key] = (subjMap[key] || 0) + s.count;
  });
  var subjList = Object.entries(subjMap).sort(function(a,b){ return b[1] - a[1]; });

  var defaultRate = parseInt(document.getElementById('inRate').value) || 150;
  var estIncome = totalLessons * defaultRate;

  var grid = document.getElementById('schedStatGrid');
  var entryCount = subjList.length;
  grid.innerHTML =
    '<div class="item"><div class="n">' + totalLessons + '节</div><div class="l">本月总课时</div></div>' +
    '<div class="item"><div class="n">¥' + estIncome.toLocaleString() + '</div><div class="l">预估收入</div></div>' +
    '<div class="item"><div class="n">' + entryCount + '个</div><div class="l">科目数</div></div>' +
    '<div class="item"><div class="n">' + (subjList.length > 0 ? (subjList[0][0].length > 5 ? he(subjList[0][0].slice(0,4))+'…' : he(subjList[0][0])) : '-') + '</div><div class="l">最多科目</div></div>';

  if (subjList.length > 0) {
    document.getElementById('schedDetailTable').style.display = '';
    document.getElementById('schedDetailBody').innerHTML = subjList.map(function(entry){
      var k = entry[0], v = entry[1];
      return '<tr><td>' + he(k) + '</td><td style="text-align:right;font-weight:600">' + v + '节</td><td style="text-align:right;color:var(--text-dim)">' + Math.round(v/totalLessons*100) + '%</td></tr>';
    }).join('');
  } else {
    document.getElementById('schedDetailTable').style.display = 'none';
  }

  document.getElementById('schedStats').style.display = 'block';
}

// ======================== 记一笔 ========================
function saveRecord() {
  var date = document.getElementById('inDate').value;
  var lessons = parseInt(document.getElementById('inLessons').value);
  var rate = parseInt(document.getElementById('inRate').value);
  var students = parseInt(document.getElementById('inStudents').value) || 0;
  var note = document.getElementById('inNote').value.trim();

  if (!date) return toast('请选日期');
  if (!lessons || lessons <= 0) return toast('请填节数');
  if (!rate || rate <= 0) return toast('请填课薪');

  if (_editingId) {
    var a = lR().filter(function(r){ return r.id !== _editingId; });
    a.push({ id: _editingId, date: date, lessons: lessons, rate: rate, students: students, note: note, ts: new Date().toISOString() });
    sR(a);
    toast('✨ 已更新');
    cancelEdit();
  } else {
    var a2 = lR();
    a2.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,6), date: date, lessons: lessons, rate: rate, students: students, note: note, ts: new Date().toISOString() });
    sR(a2);
    toast('⭐ 摘下一颗星！');
  }

  document.getElementById('inNote').value = '';
  document.getElementById('inLessons').value = '';
  document.getElementById('inStudents').value = '';
  syncAll();
}

function editRec(id) {
  var r = lR().find(function(x){ return x.id === id; });
  if (!r) return;

  document.getElementById('inDate').value = r.date;
  document.getElementById('inLessons').value = r.lessons;
  document.getElementById('inRate').value = r.rate;
  document.getElementById('inStudents').value = r.students || '';
  document.getElementById('inNote').value = r.note || '';
  _editingId = id;

  document.getElementById('cardAddTitle').textContent = '✏️ 编辑记录';
  document.getElementById('btnSave').textContent = '💾 保存修改';
  document.getElementById('btnCancel').style.display = '';
  document.getElementById('cardAdd').classList.add('editing');
  window.scrollTo({ top:0, behavior:'smooth' });
}

function cancelEdit() {
  _editingId = null;
  document.getElementById('inNote').value = '';
  document.getElementById('inLessons').value = '';
  document.getElementById('inStudents').value = '';
  document.getElementById('cardAddTitle').textContent = '🌙 记一笔';
  document.getElementById('btnSave').textContent = '⭐ 记一颗星';
  document.getElementById('btnCancel').style.display = 'none';
  document.getElementById('cardAdd').classList.remove('editing');
}

function delRec(id) {
  if (!confirm('确定删除这条记录？')) return;
  if (_editingId === id) cancelEdit();
  sR(lR().filter(function(r){ return r.id !== id; }));
  syncAll();
  toast('已删除');
}

function clearRecords() {
  if (!confirm('只清空收入记录，不会删除课程时间表。确定？')) return;
  cancelEdit();
  sR([]);
  syncAll();
  toast('收入记录已清空');
}

// ======================== 数据导出/导入 ========================
function exportData() {
  var data = { records: lR(), schedules: lS(), exportedAt: new Date().toISOString() };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '星星人·收入备份-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('📤 数据已导出');
}

function importData(e) {
  var file = e.target.files[0];
  if (!file) return;
  if (!confirm('导入将覆盖现有数据，确定继续？')) { e.target.value = ''; return; }
  var reader = new FileReader();
  reader.onload = function(ev){
    var data = JSON.parse(ev.target.result);
    if (data.records && Array.isArray(data.records)) { sR(data.records); }
    if (data.schedules && Array.isArray(data.schedules)) { sS(data.schedules); }
    cancelEdit();
    syncAll();
    renderScheds();
    toast('📥 数据已导入');
  };
  reader.onerror = function(){ toast('导入失败，请检查文件格式'); };
  reader.readAsText(file);
  e.target.value = '';
}

// ======================== 同步渲染 ========================
function syncAll() {
  var records = lR();
  var now = new Date();
  var thisMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  var mRecs = records.filter(function(r){ return r.date.startsWith(thisMonth); });
  var income = mRecs.reduce(function(s,r){ return s + r.lessons * r.rate; }, 0);
  var days = new Set(mRecs.map(function(r){ return r.date; })).size;
  var stus = mRecs.reduce(function(s,r){ return s + (r.students||0); }, 0);

  document.getElementById('heroIncome').textContent = income.toLocaleString();
  document.getElementById('heroDays').textContent = days;
  document.getElementById('heroMonthIncome').textContent = '¥'+income.toLocaleString();
  document.getElementById('heroStudents').textContent = stus;

  // 最近40条
  var recent = records.slice(-40).reverse();
  var le = document.getElementById('recentList');
  if (!recent.length) {
    le.innerHTML = '<div class="empty"><div class="star-mascot-sm">' + starSvgSmall() + '</div><p>还没有记录~<br>摘一颗星星开始吧 ⭐</p></div>';
  } else {
    le.innerHTML = recent.map(function(r){
      var d = new Date(r.date + 'T00:00:00');
      return '<div class="rec" onclick="editRec(\'' + r.id + '\')" role="button" tabindex="0" aria-label="编辑收入记录">' +
        '<div class="badge"><span class="d">' + d.getDate() + '</span>' + (d.getMonth()+1) + '月</div>' +
        '<div class="mid"><div class="proj">' + he(r.note||'无备注') + '</div><div class="meta">' + r.lessons + '节 × ¥' + r.rate + '/节 · 👩‍🎓' + (r.students||0) + '人</div></div>' +
        '<div class="right"><div class="income">¥' + (r.lessons*r.rate).toLocaleString() + '</div><div class="hrs">' + r.lessons + '节</div></div>' +
        '<button class="x" onclick="event.stopPropagation();delRec(\'' + r.id + '\')" aria-label="删除记录">✕</button>' +
      '</div>';
    }).join('');
  }

  if (document.getElementById('page-stats').classList.contains('active')) renderStats();
}

// ======================== 统计 + 图表(星星人暖色配色)==================
var _line, _pie, _bar;
// 星星人糖果色板 - 暖金为主,糖果粉/薰衣草紫/薄荷绿为辅
var STAR_COLORS = ['#F0B840','#FF719A','#B8A9E8','#7EC8C8','#F5A623','#FF9CC8','#C4B5F0','#90D8D8'];
var STAR_COLORS_BAR = ['#F0B840','#F5A623','#FF719A','#B8A9E8','#7EC8C8','#FF9CC8'];

function renderStats() {
  var records = lR();
  var now = new Date();
  var thisMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  var mRecs = records.filter(function(r){ return r.date.startsWith(thisMonth); });
  var tLessons = mRecs.reduce(function(s,r){ return s + r.lessons; }, 0);
  var tIncome = mRecs.reduce(function(s,r){ return s + r.lessons * r.rate; }, 0);
  var avg = tLessons > 0 ? Math.round(tIncome / tLessons) : 0;
  document.getElementById('statAvg').textContent = '¥'+avg+'/节';

  // 按月聚合
  var months = {};
  records.forEach(function(r){
    var m = r.date.substring(0,7);
    if (!months[m]) months[m] = { lessons:0, income:0, students:0, days:new Set(), subjects:{} };
    months[m].lessons += r.lessons;
    months[m].income += r.lessons * r.rate;
    months[m].students += (r.students||0);
    months[m].days.add(r.date);
    var subj = r.note || '其他';
    months[m].subjects[subj] = (months[m].subjects[subj]||0) + r.lessons * r.rate;
  });
  var sorted = Object.entries(months).sort(function(a,b){ return a[0].localeCompare(b[0]); });

  // ---- 折线图 ----
  if (_line) { _line.destroy(); _line = null; }
  var c1 = document.getElementById('chartLine');
  var box1 = document.getElementById('chartLineBox');
  if (sorted.length > 0) {
    box1.style.display = '';
    _line = new Chart(c1, {
      type:'line',
      data:{
        labels: sorted.map(function(entry){ var mo = entry[0].split('-')[1]; return parseInt(mo)+'月'; }),
        datasets:[{
          label:'收入 (¥)',
          data: sorted.map(function(entry2){ return entry2[1].income; }),
          borderColor:'#F0B840',
          backgroundColor:'rgba(240,184,64,.12)',
          borderWidth:2.5,
          fill:true,
          tension:.4,
          pointBackgroundColor:'#F0B840',
          pointRadius:4,
          pointBorderColor:'rgba(240,184,64,.3)',
          pointBorderWidth:3
        }]
      },
      options:{
        responsive:true,
        plugins:{ legend:{ display:false } },
        scales:{
          y:{
            ticks:{ color:'#8A94B8', callback:function(v){ return '¥'+v.toLocaleString(); } },
            grid:{ color:'rgba(255,255,255,.06)' }
          },
          x:{ ticks:{ color:'#8A94B8' }, grid:{ display:false } }
        }
      }
    });
  } else {
    box1.style.display = 'none';
  }

  // ---- 饼图 ----
  if (_pie) { _pie.destroy(); _pie = null; }
  var c2 = document.getElementById('chartPie');
  var box2 = document.getElementById('chartPieBox');
  var pies = Object.entries(months[thisMonth] && months[thisMonth].subjects || {}).sort(function(a,b){ return b[1]-a[1]; });
  if (pies.length > 0) {
    box2.style.display = '';
    _pie = new Chart(c2, {
      type:'doughnut',
      data:{
        labels: pies.map(function(entry){ return entry[0]; }),
        datasets:[{
          data: pies.map(function(entry2){ return entry2[1]; }),
          backgroundColor: STAR_COLORS,
          borderColor:'#0A1628',
          borderWidth:2
        }]
      },
      options:{
        responsive:true,
        plugins:{
          legend:{
            position:'bottom',
            labels:{ padding:14, usePointStyle:true, font:{ size:11 }, color:'#8A94B8' }
          }
        }
      }
    });
  } else {
    box2.style.display = 'none';
  }

  // ---- 柱状图 ----
  if (_bar) { _bar.destroy(); _bar = null; }
  var c3 = document.getElementById('chartBar');
  var box3 = document.getElementById('chartBarBox');
  if (sorted.length > 0) {
    box3.style.display = '';
    _bar = new Chart(c3, {
      type:'bar',
      data:{
        labels: sorted.map(function(entry){ var mo = entry[0].split('-')[1]; return parseInt(mo)+'月'; }),
        datasets:[{
          label:'收入 (¥)',
          data: sorted.map(function(entry2){ return entry2[1].income; }),
          backgroundColor: sorted.map(function(_,i){ return STAR_COLORS_BAR[i%STAR_COLORS_BAR.length]; }),
          borderRadius:8
        }]
      },
      options:{
        responsive:true,
        plugins:{ legend:{ display:false } },
        scales:{
          y:{
            ticks:{ color:'#8A94B8', callback:function(v){ return '¥'+v.toLocaleString(); } },
            grid:{ color:'rgba(255,255,255,.06)' }
          },
          x:{ ticks:{ color:'#8A94B8' }, grid:{ display:false } }
        }
      }
    });
  } else {
    box3.style.display = 'none';
  }

  // ---- 历史月份 ----
  var allM = Object.entries(months).sort(function(a,b){ return b[0].localeCompare(a[0]); });
  document.getElementById('monthList').innerHTML = allM.length === 0
    ? '<div class="empty"><div class="star-mascot-sm">' + starSvgSmall() + '</div><p>还没有数据</p></div>'
    : allM.map(function(entry){
        var m = entry[0], d = entry[1];
        var y = m.split('-')[0], mo = m.split('-')[1];
        return '<div class="mo-item"><div class="n">' + y + '年' + parseInt(mo) + '月</div><div class="d"><div style="font-weight:600;color:var(--gold)">¥' + d.income.toLocaleString() + '</div><div style="font-size:.7rem;color:var(--text-dim)">' + d.lessons + '节 · ' + d.days.size + '天 · 👩‍🎓' + d.students + '人</div></div></div>';
      }).join('');
}

// ======================== 切换 tab ========================
function sw(t) {
  document.getElementById('tbAdd').classList.toggle('on', t==='add');
  document.getElementById('tbAdd').setAttribute('aria-selected', t==='add');
  document.getElementById('tbStats').classList.toggle('on', t==='stats');
  document.getElementById('tbStats').setAttribute('aria-selected', t==='stats');
  document.getElementById('page-add').style.display = t==='add' ? 'block' : 'none';
  document.getElementById('page-stats').classList.toggle('active', t==='stats');
  if (t==='stats') renderStats();
}

// ======================== 工具 ========================
function he(s) { var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

/** 小号星星人 SVG */
function starSvgSmall() {
  return '<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">' +
    '<defs>' +
      '<linearGradient id="ssg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFEAA0"/><stop offset="100%" stop-color="#F5A623"/></linearGradient>' +
    '</defs>' +
    '<circle cx="80" cy="80" r="70" fill="rgba(255,211,110,.18)"/>' +
    '<polygon points="80,8 97,60 152,60 108,93 122,144 80,112 38,144 52,93 8,60 63,60" fill="url(#ssg)" stroke="#E8A820" stroke-width="2" stroke-linejoin="round"/>' +
  '</svg>';
}

// ======================== 初始化 ========================
document.getElementById('inDate').value = new Date().toISOString().split('T')[0];
document.getElementById('scDateEnd').value = new Date().toISOString().split('T')[0];
document.getElementById('scDateStart').value = new Date().toISOString().split('T')[0];
var sr = localStorage.getItem('kitty_defaultRate');
document.getElementById('inRate').value = sr || '150';
document.getElementById('inRate').addEventListener('change', function(){ localStorage.setItem('kitty_defaultRate', this.value); });
syncAll();
renderScheds();
</script>
